name: Build, Push to Docker Hub and Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/wibe-studio:latest

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Hugging Face Hub
      run: pip install huggingface_hub

    - name: Deploy to Hugging Face Spaces via SDK
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        import os
        import sys
        from huggingface_hub import HfApi
        
        token = os.getenv('HF_TOKEN')
        repo_id = 'MyMFG/wibe-studio'
        
        print('=== MENCOBA LOGIN KE HUGGING FACE API ===')
        try:
            api = HfApi(token=token)
            user_info = api.whoami()
            print(f'✅ LOGIN SUKSES! Terdeteksi sebagai: {user_info.get(\"name\")}')
            
            print('\n=== MEMULAI SYNCHRONIZATION/UPLOAD FOLDER ===')
            api.upload_folder(
                folder_path='.',
                repo_id=repo_id,
                repo_type='space',
                ignore_patterns=['.git*', '.github*']
            )
            print('✅ DEPLOYMENT KE SPACES BERHASIL TOTAL!')
            
        except Exception as e:
            print('\n❌ TERJADI EROR PADA SISTEM API:')
            print(str(e))
            sys.exit(1)
        "