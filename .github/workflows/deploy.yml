name: Build, Push to Docker Hub and Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/go-studio:latest

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Hugging Face Hub
      run: pip install huggingface_hub

    - name: Run Hugging Face Diagnostics & Deploy
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        import os
        import sys
        from huggingface_hub import HfApi
        
        token = os.getenv('HF_TOKEN')
        if not token:
            print('#'*70)
            print('❌ EROR KRITIKAL: Secrets.HF_TOKEN KOSONG ATAU TIDAK TERBACA DI GITHUB!')
            print('Silakan cek kembali apakah Anda mengetik nama secret-nya HF_TOKEN (bukan yang lain).')
            print('#'*70)
            sys.exit(1)
            
        api = HfApi(token=token)
        
        print('=== MEMULAI MODE DETEKTIF ===')
        try:
            user_info = api.whoami()
            username = user_info.get('name')
            print(f'✅ KONEKSI SUKSES!')
            print(f'-> Username/Organisasi asli yang terbaca token: {username}')
            
            print('\n=== MEMINDAI REPOSITORI SPACES ANDA ===')
            spaces = list(api.list_spaces(author=username))
            
            exact_space_id = None
            print('Daftar nama Space yang berhak diakses oleh token ini:')
            for space in spaces:
                print(f' - {space.id}')
                if 'go-studio' in space.id.lower():
                    exact_space_id = space.id
            
            if not exact_space_id:
                print('\n' + '!'*70)
                print('❌ EROR: Space dengan nama wibe-studio TIDAK ADA di bawah akun ini!')
                print('Silakan cek list di atas, nama Space lu yang tertulis di Hugging Face apa?')
                print('!'*70)
                sys.exit(1)
                
            print(f'\n🎯 Target ditemukan: {exact_space_id}')
            print('=== MEMULAI PROSES UPLOAD FOLDER ===')
            
            api.upload_folder(
                folder_path='.',
                repo_id=exact_space_id,
                repo_type='space',
                ignore_patterns=['.git*', '.github*']
            )
            print('✅ BOOM! DEPLOYMENT SAKSES TOTAL!')
            
        except Exception as e:
            print('\n❌ API ERROR TERDETEKSI:')
            print(str(e))
            sys.exit(1)
        "