name: Build, Push to Docker Hub and Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/wibe-studio:latest

    - name: Deploy to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
        echo "=== MENGECEK VALIDITAS TOKEN LANGSUNG KE HUGGING FACE ==="
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/whoami)
        echo "Hasil respon server Hugging Face: $RESPONSE"
        
        if [ "$RESPONSE" != "200" ]; then
          echo "======================================================================="
          echo " ❌ EROR: TOKEN DI-REJECT/DITOLAK OLEH HUGGING FACE API! "
          echo " Karakter token di GitHub Secrets ada yang salah, typo, atau kurang. "
          echo "======================================================================="
          exit 1
        fi
        
        echo " ✅ Token Valid! Melanjutkan push menggunakan kredensial steril..."
        git push --force https://user:$HF_TOKEN@huggingface.co/spaces/MyMFG/go-studio HEAD:refs/heads/main